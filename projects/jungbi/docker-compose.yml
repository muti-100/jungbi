version: '3.9'

services:
  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./src/web/.env.local
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
