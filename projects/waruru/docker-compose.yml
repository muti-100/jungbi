version: "3.9"

# Default profile: postgres, redis, backend, web, ai-sidecar
# Routing profile: adds osrm  (requires Seoul OSM data — see docs/osrm-setup.md)
# A/B test profile: adds growthbook + mongo

services:

  # ── Core data ─────────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: waruru
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d waruru"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application services ───────────────────────────────────────────────────

  backend:
    build: ./src/backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./src/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build: ./src/web
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./src/web/.env.local
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  ai-sidecar:
    build: ./src/ai-sidecar
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./src/ai-sidecar/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Optional: OSRM routing ─────────────────────────────────────────────────
  # Profile: routing
  #
  # Before starting, download and preprocess Seoul road network:
  #   mkdir -p osrm-data
  #   wget -O osrm-data/seoul.osm.pbf https://download.geofabrik.de/asia/south-korea-latest.osm.pbf
  #   docker run --rm -v $(pwd)/osrm-data:/data osrm/osrm-backend:v5.27.1 osrm-extract -p /opt/car.lua /data/seoul.osm.pbf
  #   docker run --rm -v $(pwd)/osrm-data:/data osrm/osrm-backend:v5.27.1 osrm-partition /data/seoul.osrm
  #   docker run --rm -v $(pwd)/osrm-data:/data osrm/osrm-backend:v5.27.1 osrm-customize /data/seoul.osrm
  #   Then run: docker compose --profile routing up -d

  osrm:
    image: osrm/osrm-backend:v5.27.1
    profiles: [routing]
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/seoul.osrm
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Optional: GrowthBook A/B testing ──────────────────────────────────────
  # Profile: abtest
  #   docker compose --profile abtest up -d

  mongo:
    image: mongo:6
    profiles: [abtest]
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: growthbook
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  growthbook:
    image: growthbook/growthbook:latest
    profiles: [abtest]
    restart: unless-stopped
    ports:
      - "3100:3100"   # GrowthBook UI
      - "3300:3300"   # GrowthBook API (SDK endpoint)
    environment:
      MONGODB_URI: mongodb://mongo:27017/growthbook
    volumes:
      - gbdata:/usr/local/src/app/packages/back-end/uploads
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  mongodata:
  gbdata:
